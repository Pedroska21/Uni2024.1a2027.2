{% extends 'base.html' %}

{% block content %}

    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-sm-12 col-xs-12 text-center">
                <form method="POST">
                    {% csrf_token %}
                    <legend class="border-bottom mb-4">Deletar episódio</legend>
                    <h5>Tem certeza?</h5>
                    <p>Este episódio será removido permanentemente</p>
                    <button class="btn btn-outline-danger btn-block" type="submit">
                        Deletar
                    </button>
                </form>
            </div>
        </div>
    </div>
{% endblock content %}
