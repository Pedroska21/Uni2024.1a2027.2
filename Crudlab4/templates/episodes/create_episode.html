{% extends 'base.html' %}

{% block content %}

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-sm-12 col-xs-12">
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <legend class="border-bottom mb-4"> Postar episódio</legend>
                {{ form.as_p }}
                <button class="btn btn-outline-info btn-block mt-3" type="submit">
                    Enviar
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock content %}
