<!DOCTYPE html>
<html lang="en">
<head>
<style>
input[type=text], input[type=password] {
  width: 100%;
  padding: 12px 20px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

button {
  background-color: rgb(123, 238, 140);
  color: white;
  padding: 14px 20px;
  margin: 8px 0;
  border: none;
  cursor: pointer;
  width: 100%;
}
.container {
    position: center;
    background-color: white;
    margin-top: 10%;
    margin-left: auto;
    margin-right: auto;
    height: 30%;
    width: 30%;
  padding: 16px;
}
body{
  background:linear-gradient(180deg,#041018 0%, #07121a 60%);
  background-repeat: no-repeat;
  background-attachment: fixed;
}

</style>
</head>
<body>
<div class="container">
    {% for message in messages %}
        <div class="alert alert-{{message.tags}} alert-dismissible fade show" role="alert"> {{message}}</div>
        {% endfor %}
    <form method="post">
    {% csrf_token %}
    <label for="exampleInputEmail1" class="form-label">Usuário</label>
        <input name="username" type="text" class="form-control" id="exampleInputEmail1">
    <label for="exampleInputPassword1" class="form-label">Senha</label>
        <input name="password" type="password" class="form-control" id="exampleInputPassword1">
    <a href="{% url 'register' %}">Não cadastrado?</a>
  <button type="submit" class="btn btn-primary">Entrar</button>
</form>
</div>
</body>
</html>
